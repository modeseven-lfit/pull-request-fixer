# Action test/validation workflow
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  ### Build the Python package ###
  python-build:
    name: 'Build Python Package'
    runs-on: 'ubuntu-latest'
    outputs:
      matrix_json: "${{ steps.python-build.outputs.matrix_json }}"
      artefact_name: "${{ steps.python-build.outputs.artefact_name }}"
      artefact_path: "${{ steps.python-build.outputs.artefact_path }}"
    permissions:
      contents: read
    timeout-minutes: 12
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d  # v2.16.1
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Build Python project'
        id: python-build
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@7ff456c72f1dd50ef212ea7222efc12693221af3  # v1.0.4
        with:
          clear_cache: 'false'

  ### Test the CLI Tool ###
  cli-tests:
    name: "Test CLI Tool"
    runs-on: ubuntu-latest
    needs: python-build
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Install uv"
        # yamllint disable-line rule:line-length
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: "Install package with uv"
        shell: bash
        run: |
          # Install the tool using uv
          uv tool install .

      - name: "Test CLI help"
        shell: bash
        run: |
          # Test that the CLI is installed and working
          pull-request-fixer --version
          pull-request-fixer --help

      - name: "Run unit tests"
        shell: bash
        run: |
          # Run pytest tests if they exist
          if [ -f "tests/test_graphql_queries.py" ]; then
            uv run pytest tests/test_graphql_queries.py -v || true
          fi

  ### Test against local GitHub organization ###
  integration-test:
    name: "Integration Test"
    runs-on: ubuntu-latest
    needs: python-build
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 15
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: "Checkout repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "Install uv"
        # yamllint disable-line rule:line-length
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: "Install package with uv"
        shell: bash
        run: |
          # Install the tool using uv
          uv tool install .

      - name: "Test GraphQL queries with debug script"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run debug script to validate GraphQL queries
          echo "## GraphQL Query Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          uv run python scripts/debug_graphql.py \
            --org "${{ github.repository_owner }}" 2>&1 | tee debug.log

          # Add results to summary
          if grep -q "✅ Query successful" debug.log; then
            echo "✅ GraphQL queries working correctly" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ GraphQL query issues detected - see logs" \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: "Scan organization for pull requests"
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Test scanning the organization in dry-run mode
          echo "## Organization Scan Test" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Testing scan of organization: ${{ github.repository_owner }}" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          pull-request-fixer "${{ github.repository_owner }}" \
            --fix-title \
            --dry-run \
            --verbose \
            2>&1 | tee scan.log

          # Extract key metrics from output
          if grep -q "Found.*open PRs" scan.log; then
            grep "Found.*open PRs" scan.log >> "$GITHUB_STEP_SUMMARY"
          fi

          if grep -q "Found.*PRs with title mismatches" scan.log; then
            grep "Found.*PRs with title mismatches" scan.log \
              >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Dry-run scan completed successfully" >> "$GITHUB_STEP_SUMMARY"

      - name: "Upload test logs"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-logs
          path: |
            debug.log
            scan.log
          retention-days: 30
